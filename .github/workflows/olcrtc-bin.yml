name: Build olcrtc android binaries (option-b — separate process)

# Option-b path for integrating olcRTC WITHOUT the gomobile-merge pain (the separate-.aar build hit
# "Duplicate class go.Seq"; the merged bind hit "no exported names"). Here we cross-compile olcRTC's
# STANDALONE cmd/olcrtc as static PIE binaries (pure-Go, CGO=0, NO NDK) for the Android ABIs. The app
# ships them as jniLibs/<abi>/libolcrtc.so and exec's one as a CHILD PROCESS → it opens a local SOCKS5;
# sing-box routes the chosen traffic to it, with the SFU dest (telemost/jitsi) routed DIRECT so the
# WebRTC sockets don't loop back through the tun (no VpnService.protect needed). olcRTC runs in its
# OWN process/runtime → zero shared go.* / JNI with libbox. Pinned to OLCRTC_REF; Go 1.26.
on:
  push:
    paths:
      - .github/workflows/olcrtc-bin.yml
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout our repo (for the pins)
        uses: actions/checkout@v4
      - name: Load pins from version.properties
        id: pin
        run: |
          set -euo pipefail
          source <(grep -E '^(OLCRTC_GO_VERSION|OLCRTC_REF)=' version.properties)
          echo "go_version=${OLCRTC_GO_VERSION#go}" >> "$GITHUB_OUTPUT"
          echo "olcrtc_ref=${OLCRTC_REF}"           >> "$GITHUB_OUTPUT"
      - name: Set up Go ${{ steps.pin.outputs.go_version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.pin.outputs.go_version }}
          check-latest: false
      - name: Clone olcRTC at ${{ steps.pin.outputs.olcrtc_ref }}
        run: |
          set -euo pipefail
          git clone https://github.com/openlibrecommunity/olcrtc.git olcrtc
          git -C olcrtc checkout "${{ steps.pin.outputs.olcrtc_ref }}"
          git -C olcrtc rev-parse HEAD
      - name: Cross-compile cmd/olcrtc → static PIE for android ABIs
        working-directory: olcrtc
        run: |
          set -euo pipefail
          go mod download
          mkdir -p out
          # GOOS=linux + static PIE runs on Android (linux kernel); CGO off (no NDK). -checklinkname=0
          # because olcRTC/deps use //go:linkname (matches its own magefile ldflags).
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64        go build -buildmode=pie -ldflags '-s -w -checklinkname=0' -o out/libolcrtc-arm64-v8a.so   ./cmd/olcrtc
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7  go build -buildmode=pie -ldflags '-s -w -checklinkname=0' -o out/libolcrtc-armeabi-v7a.so ./cmd/olcrtc
          file out/* || true
          ls -lh out/
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: olcrtc-bin
          path: olcrtc/out/
          if-no-files-found: error
