name: Build app APK

# Builds the MaestroVPN TV app (forked sing-box-for-android, flavor "other" =
# GitHub/sideload distribution). Pulls libbox.aar from the latest successful
# "Build libbox.aar" run. Debug build for now (no signing secret needed) — a
# signed release variant is added once SIGNING_KEYSTORE_B64 is configured.

on:
  push:
    # ONLY main publishes an OTA Release. Feature-branch pushes must NOT cut a
    # --latest GitHub Release (that would auto-OTA un-merged code via the mirror);
    # use android-test.yml (artifact-only) to compile-check a branch instead.
    branches: [main]
    paths:
      - 'app/**'
      - 'third_party/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - 'version.properties'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set build version (monotonic — the in-app updater always sees newer)
        id: ver
        run: |
          set -euo pipefail
          VN="1.0.${{ github.run_number }}"
          VC="${{ github.run_number }}"
          sed -i -E "s/^VERSION_CODE=.*/VERSION_CODE=${VC}/" version.properties
          sed -i -E "s/^VERSION_NAME=.*/VERSION_NAME=${VN}/" version.properties
          echo "version_name=${VN}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VC}" >> "$GITHUB_OUTPUT"
          echo "MaestroVPN TV ${VN} (code ${VC})"

      - name: Read NDK pin from version.properties
        id: pin
        run: |
          set -euo pipefail
          source <(grep -E '^NDK_VERSION=' version.properties)
          echo "ndk_version=${NDK_VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      # Cache resolved dependencies so a jitpack/CDN outage (compose-markdown and
      # libsu live ONLY on jitpack, which periodically 403s behind Cloudflare)
      # can't block a build once these have been fetched successfully once.
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'settings.gradle.kts', 'version.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install pinned NDK + SDK platform
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;${{ steps.pin.outputs.ndk_version }}" "platforms;android-36" "build-tools;36.0.0" >/dev/null
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${{ steps.pin.outputs.ndk_version }}" >> "$GITHUB_ENV"

      - name: Fetch libbox.aar, gated on the SAME-COMMIT libbox build
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p app/libs
          ART=libbox-aar
          RUN_ID=""
          q() { python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('$1','') if isinstance(d,dict) else '')"; }
          sameSHA() {
            gh run list --workflow=libbox.yml -L 30 \
              --json databaseId,headSha,status,conclusion \
              -q "[.[] | select(.headSha==\"$SHA\")] | .[0] // empty"
          }
          # A push touching version.properties starts libbox.yml in PARALLEL with this run at
          # the same SHA — so we must wait for THAT run, not a stale earlier one. An app-only
          # push doesn't rebuild libbox → no same-SHA run → reuse the newest libbox.aar.
          SAME="$(sameSHA)"
          if [ -n "$SAME" ]; then
            for i in $(seq 1 60); do
              ST="$(printf '%s' "$SAME" | q status)"; CC="$(printf '%s' "$SAME" | q conclusion)"
              if [ "$ST" = "completed" ]; then
                if [ "$CC" = "success" ]; then
                  RUN_ID="$(printf '%s' "$SAME" | q databaseId)"; break
                fi
                echo "::error::libbox build for $SHA concluded '$CC' — refusing to ship a stale/mismatched aar." >&2
                exit 1
              fi
              echo "waiting for same-commit libbox build ($ST) [$i/60]..."
              sleep 30; SAME="$(sameSHA)"
            done
            [ -n "$RUN_ID" ] || { echo "::error::timed out waiting for same-commit libbox build" >&2; exit 1; }
          fi
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(gh run list --workflow=libbox.yml --status=success -L1 --json databaseId -q '.[0].databaseId // empty')
          fi
          [ -n "$RUN_ID" ] || { echo "::error::No successful libbox build found — run libbox.yml first." >&2; exit 1; }
          echo "Downloading $ART from run $RUN_ID (commit $SHA)"
          gh run download "$RUN_ID" -n "$ART" -D app/libs
          ls -lh app/libs/

      - name: Fetch olcrtc android binaries → jniLibs (option-b; NON-FATAL)
        # olcRTC is an opt-in fallback for the owner's login only — its native binary must NEVER
        # block the fleet OTA. If olcrtc-bin.yml has no successful run, warn and ship without it
        # (the olcrtc socks outbound, emitted to wapmix only, simply has no local listener).
        # useLegacyPackaging=true (app/build.gradle.kts) extracts these .so to nativeLibraryDir,
        # so the app can exec them as a child process.
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          set -euo pipefail
          RUN_ID=$(gh run list --workflow=olcrtc-bin.yml --status=success -L1 --json databaseId -q '.[0].databaseId // empty')
          if [ -z "$RUN_ID" ]; then
            echo "::warning::No successful olcrtc-bin.yml run — shipping WITHOUT the olcRTC binary (wapmix-only fallback inert)." >&2
            exit 0
          fi
          echo "Downloading olcrtc-bin from run $RUN_ID"
          gh run download "$RUN_ID" -n olcrtc-bin -D olcrtc-bin
          for abi in arm64-v8a armeabi-v7a; do
            src="olcrtc-bin/libolcrtc-${abi}.so"
            if [ -f "$src" ]; then
              mkdir -p "app/src/main/jniLibs/${abi}"
              cp "$src" "app/src/main/jniLibs/${abi}/libolcrtc.so"
              echo "placed jniLibs/${abi}/libolcrtc.so ($(stat -c%s "$src") bytes)"
            else
              echo "::warning::olcrtc binary for ${abi} missing in artifact" >&2
            fi
          done

      - name: Fetch WDTT mobile transport binaries → jniLibs (required)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RUN_ID=$(gh run list --workflow=wdtt-bin.yml --status=success -L1 --json databaseId -q '.[0].databaseId // empty')
          [ -n "$RUN_ID" ] || { echo "::error::No successful wdtt-bin.yml artifact." >&2; exit 1; }
          gh run download "$RUN_ID" -n wdtt-bin -D wdtt-bin
          source <(grep -E '^WDTT_REF=' version.properties)
          test "$(cat wdtt-bin/WDTT_UPSTREAM_COMMIT)" = "$WDTT_REF"
          (cd wdtt-bin && sha256sum -c wdtt-sha256.txt)
          for abi in arm64-v8a armeabi-v7a; do
            src="wdtt-bin/libwdtt-${abi}.so"
            test -s "$src"
            mkdir -p "app/src/main/jniLibs/${abi}"
            cp "$src" "app/src/main/jniLibs/${abi}/libwdtt.so"
          done

      - name: Materialize the stable signing keystore from secret
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${SIGNING_KEYSTORE_B64:-}" ]; then
            echo "::warning::SIGNING_KEYSTORE_B64 secret missing — build will use a throwaway debug key and OTA updates won't install." >&2
          else
            echo "$SIGNING_KEYSTORE_B64" | base64 -d > app/release.keystore
            echo "Wrote app/release.keystore ($(stat -c%s app/release.keystore) bytes)"
          fi

      - name: Build :app:assembleOtherDebug
        env:
          # base64 properties (KEYSTORE_PASS/ALIAS_NAME/ALIAS_PASS) read by getProps;
          # makes the debug build sign with the stable release.keystore above.
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          # Retry to survive transient jitpack/CDN dependency-resolution blips
          # (HTTP 403 behind Cloudflare). A sustained outage still fails after the
          # window, but short flaps self-heal.
          n=0
          until [ "$n" -ge 4 ]; do
            if ./gradlew :app:assembleOtherDebug --stacktrace --no-daemon; then
              exit 0
            fi
            n=$((n + 1))
            echo "::warning::gradle attempt $n failed (likely a transient jitpack/CDN outage) — retrying in 90s" >&2
            sleep 90
          done
          echo "::error::gradle build failed after retries" >&2
          exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: maestrovpn-tv-debug-apk
          path: app/build/outputs/apk/other/debug/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release (OTA source for the in-app updater)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VN="${{ steps.ver.outputs.version_name }}"
          VC="${{ steps.ver.outputs.version_code }}"
          APK=$(ls app/build/outputs/apk/other/debug/*.apk | head -1)
          # Asset the in-app GitHubUpdateChecker reads to learn the published version.
          printf '{"version_code": %s, "version_name": "%s"}\n' "$VC" "$VN" > version-metadata.json
          gh release create "tv-v${VN}" \
            "$APK" version-metadata.json \
            --title "MaestroVPN TV ${VN}" \
            --notes "Автосборка ${VN} (CI run ${{ github.run_number }}). Установленное приложение обновится само — переустанавливать вручную не нужно." \
            --latest
