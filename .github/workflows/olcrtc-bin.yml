name: Build olcrtc android binaries (option-b — separate process)

# Option-b path for integrating olcRTC WITHOUT the gomobile-merge pain (the separate-.aar build hit
# "Duplicate class go.Seq"; the merged bind hit "no exported names"). Here we cross-compile olcRTC's
# STANDALONE cmd/olcrtc as static PIE binaries (pure-Go, CGO=0, NO NDK) for the Android ABIs. The app
# ships them as jniLibs/<abi>/libolcrtc.so and exec's one as a CHILD PROCESS → it opens a local SOCKS5;
# sing-box routes the chosen traffic to it, with the SFU dest (telemost/jitsi) routed DIRECT so the
# WebRTC sockets don't loop back through the tun (no VpnService.protect needed). olcRTC runs in its
# OWN process/runtime → zero shared go.* / JNI with libbox. Pinned to OLCRTC_REF; Go 1.26.
on:
  push:
    paths:
      - .github/workflows/olcrtc-bin.yml
      - version.properties # OLCRTC_REF / OLCRTC_GO_VERSION / NDK_VERSION bump → rebuild the binary
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout our repo (for the pins)
        uses: actions/checkout@v4
      - name: Load pins from version.properties
        id: pin
        run: |
          set -euo pipefail
          source <(grep -E '^(OLCRTC_GO_VERSION|OLCRTC_REF|NDK_VERSION)=' version.properties)
          echo "go_version=${OLCRTC_GO_VERSION#go}" >> "$GITHUB_OUTPUT"
          echo "olcrtc_ref=${OLCRTC_REF}"           >> "$GITHUB_OUTPUT"
          echo "ndk_version=${NDK_VERSION}"         >> "$GITHUB_OUTPUT"
      - name: Set up Go ${{ steps.pin.outputs.go_version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.pin.outputs.go_version }}
          check-latest: false
      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install pinned Android NDK ${{ steps.pin.outputs.ndk_version }}
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;${{ steps.pin.outputs.ndk_version }}" "platform-tools"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${{ steps.pin.outputs.ndk_version }}" >> "$GITHUB_ENV"
      - name: Clone olcRTC at ${{ steps.pin.outputs.olcrtc_ref }}
        run: |
          set -euo pipefail
          git clone https://github.com/openlibrecommunity/olcrtc.git olcrtc
          git -C olcrtc checkout "${{ steps.pin.outputs.olcrtc_ref }}"
          git -C olcrtc rev-parse HEAD
      - name: Cross-compile cmd/olcrtc → static PIE for android ABIs
        working-directory: olcrtc
        run: |
          set -euo pipefail
          go mod download
          mkdir -p out
          # Android requires PIE executables, and -buildmode=pie needs EXTERNAL (cgo) linking — so build
          # with the NDK clang as CC + CGO_ENABLED=1 + GOOS=android (not GOOS=linux). -checklinkname=0:
          # olcRTC/deps use //go:linkname (matches its own magefile ldflags).
          TC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 CC="$TC/aarch64-linux-android21-clang" \
            go build -buildmode=pie -ldflags '-s -w -checklinkname=0' -o out/libolcrtc-arm64-v8a.so   ./cmd/olcrtc
          CGO_ENABLED=1 GOOS=android GOARCH=arm GOARM=7 CC="$TC/armv7a-linux-androideabi21-clang" \
            go build -buildmode=pie -ldflags '-s -w -checklinkname=0' -o out/libolcrtc-armeabi-v7a.so ./cmd/olcrtc
          file out/* || true
          ls -lh out/
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: olcrtc-bin
          path: olcrtc/out/
          if-no-files-found: error
