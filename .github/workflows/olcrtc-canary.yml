name: Build olcRTC sideload canary APK

# A NORMALLY-VERSIONED, release-signed sideload APK of feat/olcrtc-aar that the owner can
# install on ANY device to test olcRTC, WITHOUT blocking future OTAs (unlike android-test.yml,
# whose 90000+ versionCode permanently freezes the device). vc=119 = one above the live fleet
# (118): installs as an update, and the next monotonic fleet release (run_number ≥120) OTA-
# replaces it automatically. ⛔ Artifact ONLY — NO GitHub Release, so the OTA mirror never
# serves it. Carries the NORMAL fleet libbox.aar (engine unchanged) + the olcRTC binary.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/olcrtc-canary.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set canary version (vc 119 — installs over fleet 118, OTA-replaceable by ≥120)
        run: |
          set -euo pipefail
          sed -i -E "s/^VERSION_CODE=.*/VERSION_CODE=119/" version.properties
          sed -i -E "s/^VERSION_NAME=.*/VERSION_NAME=1.0.119-olcrtc/" version.properties

      - name: Read NDK pin from version.properties
        id: pin
        run: |
          set -euo pipefail
          source <(grep -E '^NDK_VERSION=' version.properties)
          echo "ndk_version=${NDK_VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'settings.gradle.kts', 'version.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install pinned NDK + SDK platform
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;${{ steps.pin.outputs.ndk_version }}" "platforms;android-36" "build-tools;36.0.0" >/dev/null
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${{ steps.pin.outputs.ndk_version }}" >> "$GITHUB_ENV"

      - name: Fetch the NORMAL libbox.aar (latest successful libbox.yml run)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p app/libs
          RUN_ID=$(gh run list --workflow=libbox.yml --status=success -L1 \
            --json databaseId -q '.[0].databaseId // empty')
          [ -n "$RUN_ID" ] || { echo "::error::No successful libbox.yml build found." >&2; exit 1; }
          gh run download "$RUN_ID" -n libbox-aar -D app/libs
          test -f app/libs/libbox.aar

      - name: Fetch olcrtc android binaries → jniLibs (option-b; REQUIRED for the canary)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RUN_ID=$(gh run list --workflow=olcrtc-bin.yml --status=success -L1 \
            --json databaseId -q '.[0].databaseId // empty')
          [ -n "$RUN_ID" ] || { echo "::error::No successful olcrtc-bin.yml run — the canary needs the binary." >&2; exit 1; }
          gh run download "$RUN_ID" -n olcrtc-bin -D olcrtc-bin
          for abi in arm64-v8a armeabi-v7a; do
            test -f "olcrtc-bin/libolcrtc-${abi}.so"
            mkdir -p "app/src/main/jniLibs/${abi}"
            cp "olcrtc-bin/libolcrtc-${abi}.so" "app/src/main/jniLibs/${abi}/libolcrtc.so"
          done
          ls -lhR app/src/main/jniLibs/

      - name: Materialize the stable signing keystore from secret
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          if [ -n "${SIGNING_KEYSTORE_B64:-}" ]; then
            echo "$SIGNING_KEYSTORE_B64" | base64 -d > app/release.keystore
          else
            echo "::error::SIGNING_KEYSTORE_B64 missing — canary must be release-signed to install over the existing app." >&2
            exit 1
          fi

      - name: Build :app:assembleOtherDebug
        env:
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          n=0
          until [ "$n" -ge 4 ]; do
            if ./gradlew :app:assembleOtherDebug --stacktrace --no-daemon; then exit 0; fi
            n=$((n + 1))
            echo "::warning::gradle attempt $n failed — retrying in 90s" >&2
            sleep 90
          done
          echo "::error::gradle build failed after retries" >&2
          exit 1

      - name: Upload canary APK (artifact only — NO Release, NO OTA)
        uses: actions/upload-artifact@v4
        with:
          name: maestrovpn-tv-olcrtc-canary
          path: app/build/outputs/apk/other/debug/*.apk
          if-no-files-found: error
