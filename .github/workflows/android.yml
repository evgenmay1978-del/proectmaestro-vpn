name: Build app APK

# Builds the MaestroVPN TV app (forked sing-box-for-android, flavor "other" =
# GitHub/sideload distribution). Pulls libbox.aar from the latest successful
# "Build libbox.aar" run. Debug build for now (no signing secret needed) — a
# signed release variant is added once SIGNING_KEYSTORE_B64 is configured.

on:
  push:
    paths:
      - 'app/**'
      - 'third_party/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - 'version.properties'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set build version (monotonic — the in-app updater always sees newer)
        id: ver
        run: |
          set -euo pipefail
          VN="1.0.${{ github.run_number }}"
          VC="${{ github.run_number }}"
          sed -i -E "s/^VERSION_CODE=.*/VERSION_CODE=${VC}/" version.properties
          sed -i -E "s/^VERSION_NAME=.*/VERSION_NAME=${VN}/" version.properties
          echo "version_name=${VN}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VC}" >> "$GITHUB_OUTPUT"
          echo "MaestroVPN TV ${VN} (code ${VC})"

      - name: Read NDK pin from version.properties
        id: pin
        run: |
          set -euo pipefail
          source <(grep -E '^NDK_VERSION=' version.properties)
          echo "ndk_version=${NDK_VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      # Cache resolved dependencies so a jitpack/CDN outage (compose-markdown and
      # libsu live ONLY on jitpack, which periodically 403s behind Cloudflare)
      # can't block a build once these have been fetched successfully once.
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'settings.gradle.kts', 'version.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install pinned NDK + SDK platform
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;${{ steps.pin.outputs.ndk_version }}" "platforms;android-36" "build-tools;36.0.0" >/dev/null
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${{ steps.pin.outputs.ndk_version }}" >> "$GITHUB_ENV"

      - name: Fetch libbox.aar from the latest successful libbox build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p app/libs
          RUN_ID=$(gh run list --workflow=libbox.yml --status=success -L1 --json databaseId -q '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "No successful 'Build libbox.aar' run found — run that workflow first." >&2
            exit 1
          fi
          echo "Downloading libbox.aar from libbox run $RUN_ID"
          gh run download "$RUN_ID" -n libbox-aar -D app/libs
          ls -lh app/libs/

      - name: Bundle the Mieru client helper (android arm64) into jniLibs
        run: |
          set -euo pipefail
          MIERU_VER=3.33.0
          mkdir -p app/src/main/jniLibs/arm64-v8a
          tmp=$(mktemp -d)
          curl -fLS -o "$tmp/m.tgz" "https://github.com/enfein/mieru/releases/download/v${MIERU_VER}/mieru_${MIERU_VER}_android_arm64.tar.gz"
          tar xzf "$tmp/m.tgz" -C "$tmp"
          # must be named lib*.so so AGP extracts it to nativeLibraryDir as an executable
          install -m 0755 "$tmp/mieru" app/src/main/jniLibs/arm64-v8a/libmieru.so
          rm -rf "$tmp"
          ls -lh app/src/main/jniLibs/arm64-v8a/

      - name: Materialize the stable signing keystore from secret
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${SIGNING_KEYSTORE_B64:-}" ]; then
            echo "::warning::SIGNING_KEYSTORE_B64 secret missing — build will use a throwaway debug key and OTA updates won't install." >&2
          else
            echo "$SIGNING_KEYSTORE_B64" | base64 -d > app/release.keystore
            echo "Wrote app/release.keystore ($(stat -c%s app/release.keystore) bytes)"
          fi

      - name: Build :app:assembleOtherDebug
        env:
          # base64 properties (KEYSTORE_PASS/ALIAS_NAME/ALIAS_PASS) read by getProps;
          # makes the debug build sign with the stable release.keystore above.
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          # Retry to survive transient jitpack/CDN dependency-resolution blips
          # (HTTP 403 behind Cloudflare). A sustained outage still fails after the
          # window, but short flaps self-heal.
          n=0
          until [ "$n" -ge 4 ]; do
            if ./gradlew :app:assembleOtherDebug --stacktrace --no-daemon; then
              exit 0
            fi
            n=$((n + 1))
            echo "::warning::gradle attempt $n failed (likely a transient jitpack/CDN outage) — retrying in 90s" >&2
            sleep 90
          done
          echo "::error::gradle build failed after retries" >&2
          exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: maestrovpn-tv-debug-apk
          path: app/build/outputs/apk/other/debug/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release (OTA source for the in-app updater)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VN="${{ steps.ver.outputs.version_name }}"
          VC="${{ steps.ver.outputs.version_code }}"
          APK=$(ls app/build/outputs/apk/other/debug/*.apk | head -1)
          # Asset the in-app GitHubUpdateChecker reads to learn the published version.
          printf '{"version_code": %s, "version_name": "%s"}\n' "$VC" "$VN" > version-metadata.json
          gh release create "tv-v${VN}" \
            "$APK" version-metadata.json \
            --title "MaestroVPN TV ${VN}" \
            --notes "Автосборка ${VN} (CI run ${{ github.run_number }}). Установленное приложение обновится само — переустанавливать вручную не нужно." \
            --latest
