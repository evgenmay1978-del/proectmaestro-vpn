# Toolchain + sing-box pin for the libbox.aar build (.github/workflows/libbox.yml).
# Verified against SagerNet/sing-box-for-android 1.14.0-alpha.31 and
# SagerNet/sing-box tag v1.14.0-alpha.31 (commit fc25cedc25e9b1fcecb4f1589453cb381d518031).
GO_VERSION=go1.25.11
SINGBOX_REF=v1.14.0-alpha.31
NDK_VERSION=28.0.13004108

# olcRTC (WebRTC video-disguise fallback transport, github.com/openlibrecommunity/olcrtc).
# Option-b: .github/workflows/olcrtc-bin.yml cross-compiles cmd/olcrtc → jniLibs/<abi>/
# libolcrtc.so (static PIE, NDK+cgo, GOOS=android), exec'd as a child process by the app
# (bg/OlcrtcManager.kt). Needs its own Go 1.26 (libbox stays on 1.25); NDK_VERSION above.
OLCRTC_REF=3b68e0fcac31d331f87838d4b94eedc7ca295ef8
OLCRTC_GO_VERSION=go1.26.3

# MaestroVPN TV app version (read by app/build.gradle.kts getVersionProps).
VERSION_CODE=1
VERSION_NAME=0.1.0
