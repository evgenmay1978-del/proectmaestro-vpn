name: Build app APK (test / compile-check)

# Generic NON-OTA test build of the app on a feature branch, against the NORMAL
# libbox.aar (the fleet engine). Used to compile-check + optionally device-test app
# changes before merging them to main (which is what OTAs them).
#
# ⛔ SAFETY: NO GitHub Release → the OTA mirror never sees it. APK = artifact only
# (maestrovpn-tv-test-apk). HIGH versionCode so it won't self-update mid-test.
# (ci trigger: fantasy crisp-fill-eye v12 2026-07-07)
# (ci trigger: target-1to1 — mockup medallions + status colors 2026-07-07)
# (ci trigger: target-1to1 v2 — full medallion ring + live under-glow 2026-07-07)
# (ci trigger: target-1to1 v3 — CTA gold + tile icons per mockup 2026-07-07)
# (ci trigger: target-1to1 v4 — top cartouche warm-grade + gilded ivy 2026-07-07)
# (ci trigger: target-1to1 v5 — tap-zone на орб (430,711,R228) + процедурный купол удалён (1:1 baked) 2026-07-07)
# (ci trigger: living-eye v6 — живой глаз по спеке владельца (слои из его пикселей) 2026-07-08)
# (ci trigger: living-eye v7 — веки из кожи арта + вихрь только ядра (анти-артефакт) 2026-07-08)
# (ci trigger: living-eye v8 — полировка: быстрый старт вихря, направленное веко, тремор фиксации 2026-07-08)
# (ci trigger: living-eye v9 — радужка ярче при подключении (по спеке) 2026-07-08)
# (ci trigger: living-eye v10 — анатомия: миндалевидное смыкание век + перспектива роговицы (эллипс+зрачок ведёт) 2026-07-08)
# (ci trigger: living-eye v11 — анти-«монетка»: сжатие вдоль взгляда + тени кривизны яблока 2026-07-08)
# (ci trigger: living-eye v12 — полная спека моргания: Белл, тайминг-асимметрия, зрачковый рефлекс, squash, wet-flash, слёзная плёнка, полу-моргания 2026-07-08)
# (ci trigger: living-eye v13 — фикс компиляции v12: порядок определений gzx/gzy/lidK0 2026-07-08)

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/android-test.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set test version (HIGH code so the OTA never replaces it)
        id: ver
        run: |
          set -euo pipefail
          VC="$(( 90000 + ${{ github.run_number }} ))"
          VN="1.0.92-test"
          sed -i -E "s/^VERSION_CODE=.*/VERSION_CODE=${VC}/" version.properties
          sed -i -E "s/^VERSION_NAME=.*/VERSION_NAME=${VN}/" version.properties

      - name: Read NDK pin from version.properties
        id: pin
        run: |
          set -euo pipefail
          source <(grep -E '^NDK_VERSION=' version.properties)
          echo "ndk_version=${NDK_VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'settings.gradle.kts', 'version.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install pinned NDK + SDK platform
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;${{ steps.pin.outputs.ndk_version }}" "platforms;android-36" "build-tools;36.0.0" >/dev/null
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${{ steps.pin.outputs.ndk_version }}" >> "$GITHUB_ENV"

      - name: Fetch the NORMAL libbox.aar (latest successful libbox.yml run)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p app/libs
          RUN_ID=$(gh run list --workflow=libbox.yml --status=success -L1 \
            --json databaseId -q '.[0].databaseId // empty')
          [ -n "$RUN_ID" ] || { echo "::error::No successful libbox.yml build found." >&2; exit 1; }
          gh run download "$RUN_ID" -n libbox-aar -D app/libs
          test -f app/libs/libbox.aar
          ls -lh app/libs/

      - name: Fetch olcrtc android binaries → jniLibs (option-b; NON-FATAL)
        # Option-b ships olcRTC as a separate-process native binary in jniLibs/<abi>/libolcrtc.so
        # (NOT the old gomobile .aar, which collided with libbox's go.* runtime). Non-fatal so a
        # broken olcrtc-bin.yml never blocks the app compile-check.
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          set -euo pipefail
          RUN_ID=$(gh run list --workflow=olcrtc-bin.yml --status=success -L1 \
            --json databaseId -q '.[0].databaseId // empty')
          [ -n "$RUN_ID" ] || { echo "::warning::No successful olcrtc-bin.yml run — compiling without the binary." >&2; exit 0; }
          gh run download "$RUN_ID" -n olcrtc-bin -D olcrtc-bin
          for abi in arm64-v8a armeabi-v7a; do
            [ -f "olcrtc-bin/libolcrtc-${abi}.so" ] || continue
            mkdir -p "app/src/main/jniLibs/${abi}"
            cp "olcrtc-bin/libolcrtc-${abi}.so" "app/src/main/jniLibs/${abi}/libolcrtc.so"
          done
          ls -lhR app/src/main/jniLibs/ 2>/dev/null || true

      - name: Materialize the stable signing keystore from secret
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          if [ -n "${SIGNING_KEYSTORE_B64:-}" ]; then
            echo "$SIGNING_KEYSTORE_B64" | base64 -d > app/release.keystore
          fi

      - name: Build :app:assembleOtherDebug
        env:
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          n=0
          until [ "$n" -ge 4 ]; do
            if ./gradlew :app:assembleOtherDebug --stacktrace --no-daemon; then exit 0; fi
            n=$((n + 1))
            echo "::warning::gradle attempt $n failed — retrying in 90s" >&2
            sleep 90
          done
          echo "::error::gradle build failed after retries" >&2
          exit 1

      - name: Upload test APK (artifact only — NO Release, NO OTA)
        uses: actions/upload-artifact@v4
        with:
          name: maestrovpn-tv-test-apk
          path: app/build/outputs/apk/other/debug/*.apk
          if-no-files-found: error
